<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Зал — Шахматная Гостиная</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="room-page">

  <!-- Lobby (name entry before joining) -->
  <div id="lobby" class="lobby-overlay">
    <div class="lobby-card">
      <a href="/" class="logo-link lobby-logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
          <path d="M20 4C17.5 4 15.5 5.5 14.5 7.5C13 7 11.5 7.2 10.5 8C9.5 8.8 9 10 9.5 11.5C8 12 7 13.5 7.5 15C6 15.5 5 17 5.5 18.5C5 19 4.5 20 5 21C5.5 22 7 22.5 8 22H10L9 30H31L30 22H32C33 22.5 34.5 22 35 21C35.5 20 35 19 34.5 18.5C35 17 34 15.5 32.5 15C33 13.5 32 12 30.5 11.5C31 10 30.5 8.8 29.5 8C28.5 7.2 27 7 25.5 7.5C24.5 5.5 22.5 4 20 4Z" fill="var(--blue)"/>
          <rect x="9" y="30" width="22" height="3" rx="1.5" fill="var(--red)"/>
          <rect x="7" y="33" width="26" height="3" rx="1.5" fill="var(--blue)"/>
        </svg>
        <span>Шахматная Гостиная</span>
      </a>
      <h2 id="lobby-title">Присоединиться к залу</h2>
      <div class="lobby-preview">
        <video id="lobby-video" autoplay muted playsinline></video>
        <div class="lobby-preview-overlay">
          <span id="lobby-cam-status">📷 Камера</span>
        </div>
      </div>
      <div class="lobby-controls">
        <button class="lobby-btn" id="lobby-mic-btn" title="Микрофон">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
          </svg>
        </button>
        <button class="lobby-btn" id="lobby-cam-btn" title="Камера">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 7l-7 5 7 5V7z"/>
            <rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
        </button>
      </div>
      <div class="form-group">
        <label for="lobby-name-input">Ваше имя</label>
        <input type="text" id="lobby-name-input" placeholder="Введите ваше имя..." maxlength="40" autocomplete="name">
      </div>
      <button class="btn btn-primary" id="lobby-join-btn">
        <span>Войти в зал</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <div id="lobby-error" class="lobby-error" style="display:none"></div>
    </div>
  </div>

  <!-- ROOM INTERFACE -->
  <div id="room-interface" style="display:none">

    <!-- Top bar -->
    <header class="room-header">
      <a href="/" class="logo-link room-logo" title="На главную">
        <svg class="logo-icon-sm" viewBox="0 0 40 40" fill="none">
          <path d="M20 4C17.5 4 15.5 5.5 14.5 7.5C13 7 11.5 7.2 10.5 8C9.5 8.8 9 10 9.5 11.5C8 12 7 13.5 7.5 15C6 15.5 5 17 5.5 18.5C5 19 4.5 20 5 21C5.5 22 7 22.5 8 22H10L9 30H31L30 22H32C33 22.5 34.5 22 35 21C35.5 20 35 19 34.5 18.5C35 17 34 15.5 32.5 15C33 13.5 32 12 30.5 11.5C31 10 30.5 8.8 29.5 8C28.5 7.2 27 7 25.5 7.5C24.5 5.5 22.5 4 20 4Z" fill="white"/>
          <rect x="9" y="30" width="22" height="3" rx="1.5" fill="var(--red)"/>
          <rect x="7" y="33" width="26" height="3" rx="1.5" fill="white" opacity="0.6"/>
        </svg>
        <span class="room-logo-text">Шахматная Гостиная</span>
      </a>
      <div class="room-info">
        <div class="room-time" id="room-timer">00:00</div>
        <div class="room-participants-count">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          <span id="participant-count">1</span>
        </div>
      </div>
      <div class="room-header-actions">
        <button class="header-btn" id="share-link-btn" title="Поделиться ссылкой">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
          <span>Пригласить</span>
        </button>
      </div>
    </header>

    <!-- Main area: videos + sidebar -->
    <div class="room-body">

      <!-- Video grid -->
      <div class="video-area" id="video-area">
        <div class="video-grid" id="video-grid">
          <!-- Local video tile -->
          <div class="video-tile local-tile" id="local-tile">
            <video id="local-video" autoplay muted playsinline></video>
            <div class="video-overlay">
              <div class="tile-name" id="local-name-label">Вы</div>
              <div class="tile-badges" id="local-badges"></div>
            </div>
            <div class="no-video-placeholder" id="local-placeholder">
              <div class="avatar-circle" id="local-avatar">В</div>
            </div>
          </div>
        </div>

        <!-- Screen share view -->
        <div class="screen-share-overlay" id="screen-overlay" style="display:none">
          <div class="screen-share-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            <span id="screen-sharer-name">Демонстрация экрана</span>
          </div>
          <video id="screen-video" autoplay playsinline></video>
        </div>

        <!-- Floating emoji reactions -->
        <div id="reactions-container" class="reactions-container"></div>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">

        <!-- Tabs -->
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="participants" id="tab-participants">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            Участники
          </button>
          <button class="tab-btn" data-tab="chat" id="tab-chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            Чат
            <span class="chat-badge" id="chat-badge" style="display:none">0</span>
          </button>
        </div>

        <!-- Participants panel -->
        <div class="tab-content" id="tab-content-participants">
          <div class="participants-list" id="participants-list">
            <!-- Filled by JS -->
          </div>
        </div>

        <!-- Chat panel -->
        <div class="tab-content" id="tab-content-chat" style="display:none">
          <div class="chat-messages" id="chat-messages">
            <div class="chat-system">Добро пожаловать в Тульскую Шахматную Гостиную 🏰</div>
          </div>
          <div class="chat-input-area">
            <div class="emoji-picker" id="emoji-picker" style="display:none">
              <button class="emoji-btn-item" data-emoji="👍">👍</button>
              <button class="emoji-btn-item" data-emoji="❤️">❤️</button>
              <button class="emoji-btn-item" data-emoji="😂">😂</button>
              <button class="emoji-btn-item" data-emoji="🎉">🎉</button>
              <button class="emoji-btn-item" data-emoji="♟">♟</button>
              <button class="emoji-btn-item" data-emoji="🏆">🏆</button>
              <button class="emoji-btn-item" data-emoji="🤔">🤔</button>
              <button class="emoji-btn-item" data-emoji="👑">👑</button>
              <button class="emoji-btn-item" data-emoji="🎯">🎯</button>
              <button class="emoji-btn-item" data-emoji="🔥">🔥</button>
              <button class="emoji-btn-item" data-emoji="✅">✅</button>
              <button class="emoji-btn-item" data-emoji="⚡">⚡</button>
            </div>
            <div class="chat-input-row">
              <button class="emoji-toggle-btn" id="emoji-toggle" title="Эмодзи">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
              </button>
              <input type="text" id="chat-input" placeholder="Сообщение..." maxlength="500">
              <button class="send-btn" id="send-btn" title="Отправить">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
              </button>
            </div>
          </div>
        </div>

      </aside>
    </div>

    <!-- Control bar -->
    <footer class="control-bar">
      <!-- Left controls -->
      <div class="controls-left">
        <button class="ctrl-btn" id="mic-btn" data-active="true" title="Микрофон (M)">
          <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
          </svg>
          <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/>
            <path d="M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23M12 19v4M8 23h8"/>
          </svg>
          <span>Микрофон</span>
        </button>

        <button class="ctrl-btn" id="cam-btn" data-active="true" title="Камера (V)">
          <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
          <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M16 16v1a2 2 0 01-2 2H3a2 2 0 01-2-2V7a2 2 0 012-2h2m5.66 0H14a2 2 0 012 2v3.34l1 1L23 7v10M1 1l22 22"/>
          </svg>
          <span>Камера</span>
        </button>

        <button class="ctrl-btn" id="screen-btn" data-active="false" title="Демонстрация экрана (S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          <span>Экран</span>
        </button>
      </div>

      <!-- Center controls -->
      <div class="controls-center">
        <button class="ctrl-btn ctrl-hand" id="hand-btn" data-active="false" title="Поднять руку (H)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 11V6a2 2 0 00-2-2v0a2 2 0 00-2 2v0M14 10V4a2 2 0 00-2-2v0a2 2 0 00-2 2v2M10 10.5V6a2 2 0 00-2-2v0a2 2 0 00-2 2v8"/>
            <path d="M18 8a2 2 0 114 0v6a8 8 0 01-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 012.83-2.82L7 15"/>
          </svg>
          <span>Рука</span>
        </button>

        <div class="emoji-reactions-bar" id="reactions-bar">
          <button class="react-btn" data-emoji="👍" title="Класс">👍</button>
          <button class="react-btn" data-emoji="❤️" title="Сердце">❤️</button>
          <button class="react-btn" data-emoji="😂" title="Смех">😂</button>
          <button class="react-btn" data-emoji="🎉" title="Ура">🎉</button>
          <button class="react-btn" data-emoji="♟" title="Шахматы">♟</button>
          <button class="react-btn" data-emoji="🏆" title="Победа">🏆</button>
        </div>
      </div>

      <!-- Right controls -->
      <div class="controls-right">
        <button class="ctrl-btn" id="sidebar-btn" data-active="true" title="Боковая панель">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
          <span>Панель</span>
        </button>

        <button class="ctrl-btn ctrl-leave" id="leave-btn" title="Покинуть зал">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
          <span>Выйти</span>
        </button>
      </div>
    </footer>

    <!-- Share link modal -->
    <div class="modal-overlay" id="share-modal" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h3>Пригласить участников</h3>
          <button class="modal-close" id="share-modal-close">×</button>
        </div>
        <div class="modal-body">
          <label>Ссылка для участников</label>
          <div class="link-row">
            <input type="text" id="share-link-input" readonly>
            <button class="btn-copy" id="copy-share-link">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </button>
          </div>
          <p class="modal-hint">Отправьте эту ссылку участникам для входа в зал</p>
        </div>
      </div>
    </div>

    <!-- Kicked overlay -->
    <div class="kicked-overlay" id="kicked-overlay" style="display:none">
      <div class="kicked-card">
        <div class="kicked-icon">🚪</div>
        <h3>Вы покинули зал</h3>
        <p>Администратор удалил вас из конференции.</p>
        <a href="/" class="btn btn-primary">На главную</a>
      </div>
    </div>

  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/room.js"></script>
</body>
</html>
